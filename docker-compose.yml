services:
  engine-build:
    build:
      context: .
      dockerfile: docker/engine-build/Dockerfile
      args:
        EMSDK_IMAGE: ${EMSDK_IMAGE:-emscripten/emsdk:latest}
    working_dir: /workspace
    volumes:
      - .:/workspace
      - emscripten-cache:/tmp/emscripten-cache
    environment:
      EM_CACHE: /tmp/emscripten-cache
      HOME: /tmp
    ports:
      - "${WEB_PORT:-8000}:8000"
    user: "${HOST_UID:-0}:${HOST_GID:-0}"
    command:
      - sh
      - -lc
      - make web sim && python3 -m http.server 8000 --bind 0.0.0.0

volumes:
  emscripten-cache:
