# E-14: エンジン CI（① §6 / ⑤ §2）。毎 PR で「3 ターゲットビルド + make check +
# sim 受入テスト + native 起動スモーク」を回し、native を壊す退行を即検知する。
# W-16 が backend/frontend の lint・型検査ジョブをこのワークフローへ追加する予定。
name: ci

on:
  push:
    branches: [main]
  pull_request:

# 同一ブランチの古い実行は打ち切る（push 連打時の節約）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # native ビルド + lint + sim 受入テスト + 起動スモーク
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps (X11 headers + Xvfb)
        # libbsd-dev は必須: minilibx のビルドは test/mlx-test も作り、その
        # リンクが Linux で -lbsd を要求する（codes/minilibx-linux/test/Makefile.mk）。
        # 一式は README「必要なパッケージ」と同じ（xorg のメタパッケージは
        # 巨大なので、実際に要る dev パッケージだけを列挙する）
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc make python3 libx11-dev libxext-dev libbsd-dev zlib1g-dev xvfb
      - name: build native
        run: make -j"$(nproc)"
      - name: lint (make check)
        run: make check
      - name: sim acceptance tests (make test)
        run: make test
      - name: native smoke (xvfb, 5s x online whitelist maps)
        # timeout 満了 (rc=124) = 5 秒間クラッシュせず走り続けた、が成功条件。
        # それ以外の rc は起動失敗・segfault・即時終了なので落とす
        run: |
          set -u
          for m in maps/fps_map/1.cub maps/fps_map/21x21_arena.cub \
                   maps/fps_map/fps_duel.cub maps/rsp_map/rsp.cub \
                   maps/rsp_map/rsp_pillars.cub; do
            rc=0
            xvfb-run -a timeout 5 ./cub3D "$m" >/dev/null 2>&1 || rc=$?
            if [ "$rc" -ne 124 ]; then
              echo "native smoke failed: $m (rc=$rc)"
              exit 1
            fi
            echo "native smoke ok: $m"
          done

  # web (render.wasm) + sim (sim.wasm) ビルドと、Node 上での sim 通し実行
  wasm:
    runs-on: ubuntu-latest
    # docker-compose.yml と同じ既定イメージ（EMSDK_IMAGE）に合わせる
    container: emscripten/emsdk:latest
    steps:
      - uses: actions/checkout@v4
      - name: deps (make + python3 はイメージに無いことがある)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends make python3
      - name: build web + sim
        run: make web sim
      - name: 環境の確認（record.mjs 失敗時の切り分け用）
        run: |
          echo "node: $(command -v node || echo '見つからない') $(node --version 2>&1 || true)"
          echo "EMSDK_NODE: ${EMSDK_NODE:-未設定}"
          ls -la web/build/
      - name: sim end-to-end on Node (record.mjs, seed 固定で決着まで)
        # コンテナの PATH に node が無い場合は emsdk 同梱の node を使う
        run: |
          NODE_BIN="$(command -v node || echo "${EMSDK_NODE}")"
          echo "using: $NODE_BIN"
          "$NODE_BIN" web/sim_demo/record.mjs

  # W-01 で追加した TS モノレポ（backend / frontend / shared）の型検査とビルド。
  # W-16 が lint（ESLint 等）をここへ足す
  web-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: install (workspaces)
        run: npm ci
      - name: typecheck (shared / backend / frontend)
        run: npm run typecheck
      - name: build
        run: npm run build
      - name: backend が起動して /api/health を返すか
        run: |
          npm run start --workspace backend &
          for i in $(seq 1 40); do
            curl -sf http://localhost:3000/api/health >/dev/null 2>&1 && break
            sleep 0.5
          done
          curl -sf http://localhost:3000/api/health | grep -q '"status":"ok"'
