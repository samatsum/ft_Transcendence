<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>cub3D Gate 1</title>
	<link rel="icon" href="data:,">
	<style>
		:root {
			color-scheme: dark;
			font-family: system-ui, sans-serif;
			background: #111318;
			color: #f7f7f2;
		}
		/* canvas は 16:9 を保ったまま「横にも縦にも」収まる幅にする。
		   横幅だけで決めると横長ディスプレイで縦が溢れ、スクロールバーの分だけ
		   100vw が広がって横も溢れる連鎖が起きる。1.7778 = 16/9 */
		:root {
			--footer-h: 44px;
			--stage-w: min(100vw, calc((100vh - var(--footer-h)) * 1.7778), 1280px);
		}
		body {
			margin: 0;
			height: 100vh;
			overflow: hidden;
			display: grid;
			grid-template-rows: 1fr auto;
			place-items: center;
			background: #111318;
		}
		canvas {
			width: var(--stage-w);
			aspect-ratio: 16 / 9;
			image-rendering: pixelated;
			background: #000;
		}
		footer {
			width: var(--stage-w);
			box-sizing: border-box;
			height: var(--footer-h);
			padding: 10px 14px;
			display: flex;
			justify-content: space-between;
			font-size: 13px;
			color: #cfd3dc;
		}
	</style>
</head>
<body>
	<canvas id="screen" width="960" height="540" tabindex="0"></canvas>
	<footer><span id="status">loading</span><span id="fps">-- fps</span></footer>
	<!-- 恒久ワークアラウンド: emscripten 6.0.2 の UTF8 デコードは Chrome の
	     resizable ArrayBuffer 上のビューに TextDecoder.decode() を使うと例外になる。
	     glue 読込前に TextDecoder を隠して JS フォールバックへ落とし、モジュール
	     生成後に gate1.js が復元する。emsdk 更新時に要再評価（GATE1_REPORT 参照） -->
	<script>window.__cub3dTextDecoder = window.TextDecoder; window.TextDecoder = undefined;</script>
	<script src="build/render.js?v=20260715c"></script>
	<script src="gate1.js?v=20260715c"></script>
</body>
</html>
